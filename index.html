<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loading Screen</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div class="preloader" id="preloader" aria-live="polite" aria-busy="true">
    <div class="card" role="status">
      <div class="shine" aria-hidden="true"></div>

      <div class="content">
        <div class="top">
          <div class="brand">
            <div class="logo" aria-hidden="true"></div>
            <div class="title">
              <strong>Загрузка…</strong>
              <span id="stage">Подготавливаем интерфейс</span>
            </div>
          </div>
          <div class="ring" aria-hidden="true"></div>
        </div>

        <div class="status">
          <span id="percentText">0%</span>
          <span>Пожалуйста, подожди</span>
        </div>

        <div class="bar" aria-hidden="true"><i id="barFill"></i></div>

        <div class="hint">Совет: этот блок можно показывать до загрузки данных/картинок.</div>
      </div>
    </div>
  </div>

  <main class="app" id="app">
    <div class="app__inner">
      <h1>Контент страницы</h1>
      <p>Прелоадер скрывается, когда «загрузка» завершена (в примере — симуляция прогресса).</p>
    </div>
  </main>

  <script src="./preloader.js" defer></script>
</body>
</html>
